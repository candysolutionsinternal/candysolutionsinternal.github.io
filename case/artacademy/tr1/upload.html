<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交作品 - 艺术成长交付工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background-color: #f5f5f7; color: #1d1d1f; font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%); color: #fff; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0, 0, 0, 0.05); }
        .input-field { background: #fff; border: 1px solid #d2d2d7; border-radius: 12px; padding: 12px 16px; width: 100%; outline: none; transition: all 0.3s; color: #1d1d1f; }
        .input-field:focus { border-color: #4F46E5; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .upload-area { border: 2px dashed #d2d2d7; transition: all 0.3s; cursor: pointer; background: #fff; }
        .upload-area:hover { border-color: #4F46E5; background: #f5f5f7; }
        .nav-item { transition: all 0.3s; color: #515154; }
        .nav-item:hover { background: #f5f5f7; color: #000; }
        .nav-item.active { background: #4F46E5; color: white; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col p-6">
        <div class="text-2xl font-extrabold tracking-tighter mb-10 px-2">ART<span class="text-indigo-500">ACADEMY</span></div>
        <nav class="flex-1 space-y-2">
            <a href="dashboard.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium">
                <i class="fas fa-th-large"></i> 控制台
            </a>
            <a href="upload.html" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium">
                <i class="fas fa-cloud-upload-alt"></i> 提交作品
            </a>
            <a href="report.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium">
                <i class="fas fa-chart-pie"></i> 成长报告
            </a>
        </nav>
        <div class="mt-auto">
            <a href="index.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-red-500 hover:bg-red-50 transition-colors">
                <i class="fas fa-sign-out-alt"></i> 退出登录
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8 relative">
        <header class="mb-10 flex items-center gap-4">
            <a href="dashboard.html" class="w-10 h-10 bg-white border border-gray-200 rounded-full flex items-center justify-center hover:bg-gray-50 transition-all shadow-sm">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div>
                <h1 class="text-3xl font-bold">提交作品</h1>
                <p class="text-gray-500">记录您的每一次创作进步</p>
            </div>
        </header>

        <div class="max-w-3xl mx-auto">
            <form action="evaluation.html" class="space-y-8">
                <!-- Upload Zone -->
                <div class="space-y-4">
                    <label class="block text-sm font-medium text-gray-500">上传画作照片 (必填)</label>
                    <div class="upload-area rounded-3xl p-12 text-center flex flex-col items-center justify-center gap-4">
                        <div class="w-16 h-16 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-600 text-2xl">
                            <i class="fas fa-image"></i>
                        </div>
                        <div>
                            <p class="font-bold text-gray-800">点击或拖拽上传</p>
                            <p class="text-xs text-gray-400 mt-1">支持 JPG, PNG, HEIC (最大 20MB)</p>
                        </div>
                    </div>
                </div>

                <!-- Voice/Text Description -->
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <label class="block text-sm font-medium text-gray-500">语音说明 (可选)</label>
                        <button type="button" class="w-full bg-white border border-gray-200 p-6 rounded-2xl flex items-center justify-center gap-3 text-indigo-600 hover:bg-indigo-50 transition-all group shadow-sm">
                            <i class="fas fa-microphone text-xl group-hover:scale-110 transition-transform"></i>
                            <span class="font-bold">点击开始录音</span>
                        </button>
                        <p class="text-[10px] text-gray-400 text-center">你可以描述一下作画时的想法或遇到的困难</p>
                    </div>
                    <div class="space-y-4">
                        <label class="block text-sm font-medium text-gray-500">文字补充 (可选)</label>
                        <textarea class="input-field h-28 resize-none" placeholder="输入你想告诉老师的话..."></textarea>
                    </div>
                </div>

                <!-- Assignment Binding -->
                <div class="space-y-4">
                    <label class="block text-sm font-medium text-gray-500">关联作业/任务</label>
                    <select class="input-field appearance-none bg-white">
                        <option>第 4 周：基础几何体透视练习</option>
                        <option>第 3 周：阴影与明暗调子</option>
                        <option>课外练习/自由创作</option>
                    </select>
                </div>

                <div class="pt-6">
                    <button type="submit" class="w-full gradient-bg py-5 rounded-2xl font-bold text-xl hover:scale-[1.01] transition-transform shadow-[0_10px_30px_rgba(124,58,237,0.3)]">确认提交</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        gsap.from("main > *", { y: 20, opacity: 0, duration: 0.8, stagger: 0.1, ease: "power2.out" });
    </script>
</body>
</html>
