<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反馈评估 - 艺术成长交付工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background-color: #f5f5f7; color: #1d1d1f; font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%); color: #fff; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0, 0, 0, 0.05); }
        .badge { padding: 4px 12px; border-radius: 9999px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .badge-green { background: #ecfdf5; color: #059669; border: 1px solid #d1fae5; }
        .badge-indigo { background: #eef2ff; color: #4f46e5; border: 1px solid #e0e7ff; }
        .nav-item { transition: all 0.3s; color: #515154; }
        .nav-item:hover { background: #f5f5f7; color: #000; }
        .nav-item.active { background: #4F46E5; color: white; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col p-6">
        <div class="text-2xl font-extrabold tracking-tighter mb-10 px-2">ART<span class="text-indigo-500">ACADEMY</span></div>
        <nav class="flex-1 space-y-2">
            <a href="dashboard.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium">
                <i class="fas fa-th-large"></i> 控制台
            </a>
            <a href="upload.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium">
                <i class="fas fa-cloud-upload-alt"></i> 提交作品
            </a>
            <a href="report.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium">
                <i class="fas fa-chart-pie"></i> 成长报告
            </a>
        </nav>
        <div class="mt-auto">
            <a href="index.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-red-500 hover:bg-red-50 transition-colors">
                <i class="fas fa-sign-out-alt"></i> 退出登录
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8">
        <header class="mb-10 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="w-10 h-10 bg-white border border-gray-200 rounded-full flex items-center justify-center hover:bg-gray-50 transition-all shadow-sm">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <div>
                    <h1 class="text-3xl font-bold">作品反馈</h1>
                    <p class="text-gray-500">来自李老师的专业结构化评估</p>
                </div>
            </div>
            <button class="px-6 py-2 bg-white border border-gray-200 rounded-full text-sm font-bold flex items-center gap-2 hover:bg-gray-50 transition-all shadow-sm">
                <i class="fas fa-share-alt"></i> 分享
            </button>
        </header>

        <div class="grid lg:grid-cols-2 gap-10">
            <!-- Work Display -->
            <div class="space-y-6">
                <div class="glass-card rounded-[2rem] overflow-hidden aspect-square flex items-center justify-center relative group bg-white">
                    <div class="text-gray-400 italic">作品原图展示区</div>
                    <div class="absolute bottom-6 right-6 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button class="w-12 h-12 rounded-full bg-white/90 backdrop-blur-md flex items-center justify-center text-xl text-gray-800 shadow-lg">
                            <i class="fas fa-expand"></i>
                        </button>
                    </div>
                </div>
                <div class="flex gap-4">
                    <div class="flex-1 bg-white border border-gray-200 p-4 rounded-2xl flex items-center gap-3 shadow-sm">
                        <div class="w-10 h-10 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-600">
                            <i class="fas fa-microphone"></i>
                        </div>
                        <div class="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
                            <div class="h-full gradient-bg w-1/3"></div>
                        </div>
                        <span class="text-xs text-gray-400">0:12 / 0:45</span>
                    </div>
                </div>
            </div>

            <!-- Feedback Details -->
            <div class="space-y-8">
                <!-- Strengths -->
                <div class="reveal">
                    <div class="flex items-center gap-3 mb-4">
                        <span class="px-3 py-1 rounded-full bg-green-50 text-green-600 text-[10px] font-bold border border-green-100">闪光点</span>
                        <h3 class="font-bold text-gray-800">做得好的地方</h3>
                    </div>
                    <div class="glass-card p-6 rounded-2xl">
                        <ul class="space-y-3">
                            <li class="flex gap-3 text-sm text-gray-600 leading-relaxed">
                                <i class="fas fa-check text-green-500 mt-1"></i>
                                透视线的延长非常准确，能够明显感觉到物体在空间中的深度。
                            </li>
                            <li class="flex gap-3 text-sm text-gray-600 leading-relaxed">
                                <i class="fas fa-check text-green-500 mt-1"></i>
                                线条干净利落，没有多余的涂抹痕迹。
                            </li>
                        </ul>
                    </div>
                </div>

                <!-- Improvements -->
                <div class="reveal">
                    <div class="flex items-center gap-3 mb-4">
                        <span class="px-3 py-1 rounded-full bg-indigo-50 text-indigo-600 text-[10px] font-bold border border-indigo-100">强化方向</span>
                        <h3 class="font-bold text-gray-800">待提升的细节</h3>
                    </div>
                    <div class="glass-card p-6 rounded-2xl">
                        <p class="text-sm text-gray-600 leading-relaxed">
                            在处理背光面时，明暗交界线的过渡略显生硬。可以尝试通过更细腻的排线来模拟光影的自然衰减。
                        </p>
                    </div>
                </div>

                <!-- Next Step -->
                <div class="reveal">
                    <div class="flex items-center gap-3 mb-4">
                        <span class="px-3 py-1 rounded-full bg-pink-50 text-pink-600 text-[10px] font-bold border border-pink-100">下一步建议</span>
                        <h3 class="font-bold text-gray-800">最小改动提升路径</h3>
                    </div>
                    <div class="gradient-bg p-8 rounded-3xl relative overflow-hidden shadow-xl">
                        <div class="relative z-10">
                            <h4 class="text-xl font-bold mb-4">尝试“虚化排线法”</h4>
                            <p class="text-white/90 text-sm leading-relaxed mb-6">
                                在阴影的边缘，将笔触稍微倾斜，用侧锋轻轻带过，这样可以瞬间增加画面的呼吸感。
                            </p>
                            <a href="upload.html" class="inline-block px-6 py-3 bg-white text-indigo-600 rounded-xl font-bold text-sm hover:scale-105 transition-transform">去练习并提交新作品</a>
                        </div>
                        <i class="fas fa-lightbulb absolute -right-6 -bottom-6 text-9xl text-white/10 rotate-12"></i>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        gsap.from(".reveal", { y: 20, opacity: 0, duration: 0.8, stagger: 0.2, ease: "power2.out" });
    </script>
</body>
</html>
