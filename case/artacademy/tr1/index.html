<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 艺术成长交付工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background-color: #f5f5f7; color: #1d1d1f; font-family: 'Inter', sans-serif; overflow: hidden; }
        .gradient-bg { background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%); color: #fff; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0, 0, 0, 0.05); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05); }
        .input-field { background: #fff; border: 1px solid #d2d2d7; border-radius: 12px; padding: 12px 16px; width: 100%; outline: none; transition: all 0.3s; color: #1d1d1f; }
        .input-field:focus { border-color: #4F46E5; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">
    <div class="absolute inset-0 z-0 opacity-40">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-200 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-200 rounded-full blur-[120px]"></div>
    </div>

    <div class="glass-card w-full max-w-md p-8 rounded-[2rem] z-10 auth-card">
        <div class="text-center mb-8">
            <div class="text-3xl font-extrabold tracking-tighter mb-2">ART<span class="text-indigo-500">ACADEMY</span></div>
            <p class="text-gray-500">开启您的数字化艺术成长之旅</p>
        </div>

        <form action="dashboard.html" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-500 mb-2">手机号 / 邮箱</label>
                <input type="text" class="input-field" placeholder="请输入您的账号" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-500 mb-2">验证码</label>
                <div class="flex gap-3">
                    <input type="text" class="input-field" placeholder="6位验证码" required>
                    <button type="button" class="whitespace-nowrap px-4 py-2 rounded-xl border border-gray-300 text-sm hover:bg-black hover:text-white transition-all">获取验证码</button>
                </div>
            </div>
            
            <div class="flex items-center gap-6 py-2">
                <label class="flex items-center gap-2 cursor-pointer group">
                    <input type="radio" name="role" value="parent" checked class="hidden peer">
                    <div class="w-5 h-5 rounded-full border border-gray-300 peer-checked:bg-indigo-500 peer-checked:border-indigo-500 transition-all"></div>
                    <span class="text-sm text-gray-500 group-hover:text-black transition-colors">家长</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer group">
                    <input type="radio" name="role" value="student" class="hidden peer">
                    <div class="w-5 h-5 rounded-full border border-gray-300 peer-checked:bg-indigo-500 peer-checked:border-indigo-500 transition-all"></div>
                    <span class="text-sm text-gray-500 group-hover:text-black transition-colors">学生</span>
                </label>
            </div>

            <button type="submit" class="w-full gradient-bg py-4 rounded-xl font-bold text-lg hover:scale-[1.02] transition-transform active:scale-95">进入系统</button>
        </form>

        <div class="mt-8 text-center text-sm text-gray-500">
            © 2026 Candy Solutions @Candy Solutions
        </div>
    </div>

    <script>
        gsap.from(".auth-card", { y: 30, opacity: 0, duration: 1, ease: "power3.out" });
    </script>
</body>
</html>
