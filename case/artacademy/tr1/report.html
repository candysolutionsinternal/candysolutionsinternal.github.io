<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可视化报告 - 艺术成长交付工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f5f5f7; color: #1d1d1f; font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%); color: #fff; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0, 0, 0, 0.05); }
        .compare-slider { position: relative; width: 100%; height: 400px; border-radius: 24px; overflow: hidden; background: #fff; border: 1px solid rgba(0, 0, 0, 0.05); }
        .compare-after { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .compare-before { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 10; clip-path: inset(0 50% 0 0); }
        .slider-handle { position: absolute; top: 0; left: 50%; bottom: 0; width: 2px; background: #4F46E5; z-index: 20; cursor: ew-resize; }
        .slider-button { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border-radius: 50%; background: #fff; color: #4F46E5; display: flex; align-items: center; justify-content: center; shadow: 0 4px 20px rgba(0,0,0,0.15); border: 1px solid rgba(0,0,0,0.05); }
        .nav-item { transition: all 0.3s; color: #515154; }
        .nav-item:hover { background: #f5f5f7; color: #000; }
        .nav-item.active { background: #4F46E5; color: white; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col p-6">
        <div class="text-2xl font-extrabold tracking-tighter mb-10 px-2">ART<span class="text-indigo-500">ACADEMY</span></div>
        <nav class="flex-1 space-y-2">
            <a href="dashboard.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium">
                <i class="fas fa-th-large"></i> 控制台
            </a>
            <a href="upload.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium">
                <i class="fas fa-cloud-upload-alt"></i> 提交作品
            </a>
            <a href="report.html" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium">
                <i class="fas fa-chart-pie"></i> 成长报告
            </a>
        </nav>
        <div class="mt-auto">
            <a href="index.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-red-500 hover:bg-red-50 transition-colors">
                <i class="fas fa-sign-out-alt"></i> 退出登录
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8">
        <header class="mb-10 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold">成长可视化报告</h1>
                <p class="text-gray-500">见证从 Week 1 到 Week 4 的能力跨越</p>
            </div>
            <div class="flex gap-4">
                <button class="px-6 py-2 bg-white border border-gray-200 rounded-full text-sm font-bold hover:bg-gray-50 transition-all shadow-sm">导出 PDF</button>
                <button class="px-6 py-2 gradient-bg rounded-full text-sm font-bold shadow-lg hover:scale-105 transition-transform">分享到朋友圈</button>
            </div>
        </header>

        <div class="grid lg:grid-cols-3 gap-8 mb-8">
            <!-- Radar Chart -->
            <div class="lg:col-span-1 glass-card p-8 rounded-[2rem] flex flex-col items-center reveal">
                <h3 class="text-lg font-bold mb-6 self-start text-gray-800">五维能力模型</h3>
                <div class="w-full">
                    <canvas id="radarChart"></canvas>
                </div>
                <div class="mt-8 grid grid-cols-2 gap-4 w-full">
                    <div class="p-4 bg-gray-50 rounded-2xl text-center border border-gray-100">
                        <div class="text-xs text-gray-400 mb-1">最强项</div>
                        <div class="text-indigo-600 font-bold">构图能力</div>
                    </div>
                    <div class="p-4 bg-gray-50 rounded-2xl text-center border border-gray-100">
                        <div class="text-xs text-gray-400 mb-1">进步最快</div>
                        <div class="text-green-600 font-bold">线条控制</div>
                    </div>
                </div>
            </div>

            <!-- Comparison Slider -->
            <div class="lg:col-span-2 glass-card p-8 rounded-[2rem] reveal">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-bold text-gray-800">作品前后对比</h3>
                    <div class="flex items-center gap-4 text-xs">
                        <span class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-gray-300"></div> 入学作品</span>
                        <span class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-indigo-500"></div> 当前作品</span>
                    </div>
                </div>
                
                <div class="compare-slider group">
                    <img src="fish2.jpg" alt="当前作品" class="compare-after">
                    <img src="fish.jpg" alt="入学作品" class="compare-before">
                    <div class="slider-handle">
                        <div class="slider-button">
                            <i class="fas fa-arrows-alt-h"></i>
                        </div>
                    </div>
                </div>
                
                <div class="mt-8 grid md:grid-cols-2 gap-8">
                    <div class="space-y-2">
                        <h4 class="font-bold text-sm text-gray-800">Week 1：观察力初启</h4>
                        <p class="text-xs text-gray-500 leading-relaxed">线条较为零碎，物体比例存在明显的视觉偏差，透视感较弱。</p>
                    </div>
                    <div class="space-y-2">
                        <h4 class="font-bold text-sm text-indigo-600">Week 4：质感与深度的跃迁</h4>
                        <p class="text-xs text-gray-500 leading-relaxed">通过排线建立起了明确的体感，辅助线运用熟练，整体画面非常扎实。</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Weekly Progress Summary -->
        <section class="glass-card p-8 rounded-[2rem] reveal">
            <h3 class="text-lg font-bold mb-8 text-gray-800">阶段性成长总结</h3>
            <div class="grid md:grid-cols-4 gap-8">
                <div class="text-center p-6 border-r border-gray-100 last:border-0">
                    <div class="text-2xl font-bold mb-1 text-gray-800">12</div>
                    <div class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">累计练习小时</div>
                </div>
                <div class="text-center p-6 border-r border-gray-100 last:border-0">
                    <div class="text-2xl font-bold mb-1 text-gray-800">8</div>
                    <div class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">提交作品总数</div>
                </div>
                <div class="text-center p-6 border-r border-gray-100 last:border-0">
                    <div class="text-2xl font-bold mb-1 text-gray-800">15</div>
                    <div class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">获得专业建议</div>
                </div>
                <div class="text-center p-6 border-r border-gray-100 last:border-0">
                    <div class="text-2xl font-bold mb-1 text-indigo-600">Lv.3</div>
                    <div class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">当前成长等级</div>
                </div>
            </div>
        </section>
    </main>

    <script>
        gsap.from(".reveal", { y: 20, opacity: 0, duration: 0.8, stagger: 0.2, ease: "power2.out" });

        // Radar Chart
        const ctx = document.getElementById('radarChart').getContext('2d');
        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['线条', '色彩', '构图', '创意', '造型'],
                datasets: [{
                    label: '入学评估',
                    data: [2, 1, 3, 4, 2],
                    fill: true,
                    backgroundColor: 'rgba(156, 163, 175, 0.2)',
                    borderColor: 'rgb(156, 163, 175)',
                    pointBackgroundColor: 'rgb(156, 163, 175)',
                }, {
                    label: '当前水平',
                    data: [5, 3, 5, 5, 4],
                    fill: true,
                    backgroundColor: 'rgba(79, 70, 229, 0.2)',
                    borderColor: 'rgb(79, 70, 229)',
                    pointBackgroundColor: 'rgb(79, 70, 229)',
                }]
            },
            options: {
                scales: {
                    r: {
                        angleLines: { color: 'rgba(0, 0, 0, 0.05)' },
                        grid: { color: 'rgba(0, 0, 0, 0.05)' },
                        pointLabels: { color: '#4b5563', font: { size: 11, weight: '600' } },
                        ticks: { display: false },
                        suggestedMin: 0,
                        suggestedMax: 5
                    }
                },
                plugins: {
                    legend: { labels: { color: '#1f2937', font: { size: 12, weight: '500' } } }
                }
            }
        });

        // Comparison Slider Logic (Simple Mock)
        const slider = document.querySelector('.compare-slider');
        const before = document.querySelector('.compare-before');
        const handle = document.querySelector('.slider-handle');
        
        slider.addEventListener('mousemove', (e) => {
            const rect = slider.getBoundingClientRect();
            let x = e.clientX - rect.left;
            if (x < 0) x = 0;
            if (x > rect.width) x = rect.width;
            
            const percent = (x / rect.width) * 100;
            before.style.clipPath = `inset(0 ${100 - percent}% 0 0)`;
            handle.style.left = percent + '%';
        });
    </script>
</body>
</html>
